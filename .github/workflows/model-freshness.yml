name: model-freshness

# Weekly check that STATIC_POOL in scripts/lib/model-resolver.mjs is current
# against each provider's live /models catalog. Eliminates the manual quarterly
# refresh chore. Silent when all sentinels resolve identically; opens/updates
# a sticky issue when drift is detected.
#
# Mirrors memory-health.yml's pattern.

on:
  schedule:
    # Mondays 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: model-freshness
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify provider keys present
        id: keys
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::No provider keys set — skipping freshness check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run model-freshness check
        if: steps.keys.outputs.skip != 'true'
        id: freshness
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          node scripts/check-model-freshness.mjs > /tmp/model-freshness.txt
          EXIT=$?
          set -e
          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          # Map exit code to status
          case "$EXIT" in
            0) echo "status=green" >> "$GITHUB_OUTPUT" ;;
            1|2) echo "status=triggered" >> "$GITHUB_OUTPUT" ;;
            3) echo "status=insufficient_data" >> "$GITHUB_OUTPUT" ;;
            *) echo "status=error" >> "$GITHUB_OUTPUT" ;;
          esac
          # Always show the report in the workflow log
          cat /tmp/model-freshness.txt

      - name: Build issue body with marker
        if: steps.freshness.outputs.status == 'triggered'
        run: |
          {
            echo '<!-- audit-loop:model-freshness -->'
            echo
            echo "## Model pool drift detected"
            echo
            echo 'STATIC_POOL in `scripts/lib/model-resolver.mjs` is missing one or more newer models'
            echo 'served by the live provider catalogs. This causes `latest-*` sentinels to resolve'
            echo 'to stale models when offline / on cache miss.'
            echo
            echo 'Run `npm run models:freshness` locally to reproduce, or read the report below.'
            echo
            echo '```'
            cat /tmp/model-freshness.txt
            echo '```'
          } > /tmp/issue-body.md

      - name: Open / update sticky issue on trigger
        if: steps.freshness.outputs.status == 'triggered'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          MARKER='<!-- audit-loop:model-freshness -->'
          EXISTING=$(gh api "repos/$REPO/issues?state=open&labels=model-freshness&per_page=50" \
            --jq '[.[] | select(.body // "" | startswith("<!-- audit-loop:model-freshness -->"))][0].number' 2>/dev/null || echo '')

          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          FOOTER=$'\n\n---\n_Auto-generated by `.github/workflows/model-freshness.yml` — ['"run"']('"$RUN_URL"')._ '

          BODY=$(cat /tmp/issue-body.md)
          printf '%s%s' "$BODY" "$FOOTER" > /tmp/issue-body-full.md

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --body-file /tmp/issue-body-full.md --repo "$REPO"
            gh issue comment "$EXISTING" --repo "$REPO" --body "Re-triggered on $(date -u +%Y-%m-%d). See updated body and [workflow run]($RUN_URL)."
          else
            echo "Creating new issue"
            gh label create model-freshness --color FBCA04 --description 'STATIC_POOL drift vs live provider catalog' --repo "$REPO" 2>/dev/null || true
            gh issue create \
              --repo "$REPO" \
              --title "model-freshness: STATIC_POOL drift detected ($(date -u +%Y-%m-%d))" \
              --label model-freshness \
              --body-file /tmp/issue-body-full.md
          fi

      - name: Auto-close sticky issue if green
        if: steps.freshness.outputs.status == 'green'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh api "repos/$REPO/issues?state=open&labels=model-freshness&per_page=50" \
            --jq '[.[] | select(.body // "" | startswith("<!-- audit-loop:model-freshness -->"))][0].number' 2>/dev/null || echo '')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Pool current — closing #$EXISTING"
            gh issue comment "$EXISTING" --repo "$REPO" --body "Static pool current as of $(date -u +%Y-%m-%d). Auto-closing — reopen if drift returns."
            gh issue close "$EXISTING" --repo "$REPO"
          fi

      - name: Note INSUFFICIENT_DATA
        if: steps.freshness.outputs.status == 'insufficient_data'
        run: |
          echo "::warning::Could not reach any provider — skipping (rerun if a provider key is added)"

      - name: Fail workflow on infrastructure error
        if: steps.freshness.outputs.status == 'error'
        run: |
          echo "::error::model-freshness script failed with unexpected exit code"
          exit 1
