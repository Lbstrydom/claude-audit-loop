name: memory-health

# Weekly decision gate for adopting graph-shaped findings memory.
# Silent when all metrics are green; opens/updates a sticky issue
# when any trigger fires. See scripts/memory-health.mjs for thresholds.

on:
  schedule:
    # Mondays 09:00 UTC — new data from the prior week has landed
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      window-days:
        description: 'Lookback window in days'
        required: false
        default: '30'

permissions:
  contents: read
  issues: write

concurrency:
  group: memory-health
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify Supabase secrets present
        id: secrets-check
        env:
          SUPABASE_AUDIT_URL: ${{ secrets.SUPABASE_AUDIT_URL }}
          SUPABASE_AUDIT_ANON_KEY: ${{ secrets.SUPABASE_AUDIT_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_AUDIT_URL" ] || [ -z "$SUPABASE_AUDIT_ANON_KEY" ]; then
            echo "::warning::SUPABASE_AUDIT_URL / SUPABASE_AUDIT_ANON_KEY not set — skipping health check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run memory-health
        if: steps.secrets-check.outputs.skip != 'true'
        id: health
        env:
          SUPABASE_AUDIT_URL: ${{ secrets.SUPABASE_AUDIT_URL }}
          SUPABASE_AUDIT_ANON_KEY: ${{ secrets.SUPABASE_AUDIT_ANON_KEY }}
          MEMORY_HEALTH_WINDOW_DAYS: ${{ inputs.window-days || '30' }}
        run: |
          set +e
          node scripts/memory-health.mjs --out /tmp/memory-health.md
          EXIT=$?
          set -e
          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          if [ "$EXIT" = "0" ]; then
            echo "status=green" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT" = "1" ]; then
            echo "status=triggered" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload report artefact
        if: steps.secrets-check.outputs.skip != 'true' && hashFiles('/tmp/memory-health.md') != ''
        uses: actions/upload-artifact@v7
        with:
          name: memory-health-report
          path: /tmp/memory-health.md
          retention-days: 90

      # ──────────────────────────────────────────────────────────────
      # Trigger fired — open or update the sticky issue.
      # Sticky marker: '<!-- audit-loop:memory-health -->' (already in
      # the rendered markdown). We search open issues for the marker
      # and either comment+label or create a fresh one.
      # ──────────────────────────────────────────────────────────────
      - name: Open / update sticky issue on trigger
        if: steps.health.outputs.status == 'triggered'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          MARKER='<!-- audit-loop:memory-health -->'
          # Look for an open issue with the marker in its body
          EXISTING=$(gh api "repos/$REPO/issues?state=open&labels=memory-health&per_page=50" \
            --jq '[.[] | select(.body // "" | startswith("<!-- audit-loop:memory-health -->"))][0].number' 2>/dev/null || echo '')

          BODY=$(cat /tmp/memory-health.md)
          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          FOOTER=$'\n\n---\n_Auto-generated by `.github/workflows/memory-health.yml` — ['"run"']('"$RUN_URL"')._ '

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Updating existing issue #$EXISTING"
            # Replace the body wholesale — report is self-contained
            printf '%s%s' "$BODY" "$FOOTER" > /tmp/issue-body.md
            gh issue edit "$EXISTING" --body-file /tmp/issue-body.md --repo "$REPO"
            gh issue comment "$EXISTING" --repo "$REPO" --body "Re-triggered on $(date -u +%Y-%m-%d). See updated body and [workflow run]($RUN_URL)."
          else
            echo "Creating new issue"
            printf '%s%s' "$BODY" "$FOOTER" > /tmp/issue-body.md
            # Ensure label exists (idempotent)
            gh label create memory-health --color BFD4F2 --description 'Audit-loop memory-health trigger' --repo "$REPO" 2>/dev/null || true
            gh issue create \
              --repo "$REPO" \
              --title "memory-health: trigger fired ($(date -u +%Y-%m-%d))" \
              --label memory-health \
              --body-file /tmp/issue-body.md
          fi

      # ──────────────────────────────────────────────────────────────
      # Close sticky issue if metrics went back to green.
      # Only auto-closes if the last comment/body was from this workflow
      # (marker present) — avoids stomping a human takeover.
      # ──────────────────────────────────────────────────────────────
      - name: Auto-close sticky issue if green
        if: steps.health.outputs.status == 'green'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh api "repos/$REPO/issues?state=open&labels=memory-health&per_page=50" \
            --jq '[.[] | select(.body // "" | startswith("<!-- audit-loop:memory-health -->"))][0].number' 2>/dev/null || echo '')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Metrics green — closing #$EXISTING"
            gh issue comment "$EXISTING" --repo "$REPO" --body "All memory-health metrics returned to green on $(date -u +%Y-%m-%d). Auto-closing — reopen if a regression is observed."
            gh issue close "$EXISTING" --repo "$REPO"
          fi

      - name: Fail workflow on infrastructure error
        if: steps.health.outputs.status == 'error'
        run: |
          echo "::error::memory-health script failed with exit code 2 (infra error, not a health signal)"
          exit 1
