name: architectural-drift

# Weekly architectural drift sweep + retention prune.
# Mirrors memory-health.yml's sticky-issue + auto-close pattern.

on:
  schedule:
    # Mondays 09:30 UTC — 30-min stagger from memory-health
    - cron: '30 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: architectural-drift
  cancel-in-progress: false

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify Supabase secrets present
        id: secrets-check
        env:
          SUPABASE_AUDIT_URL: ${{ secrets.SUPABASE_AUDIT_URL }}
          SUPABASE_AUDIT_ANON_KEY: ${{ secrets.SUPABASE_AUDIT_ANON_KEY }}
          SUPABASE_AUDIT_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_AUDIT_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_AUDIT_URL" ] || [ -z "$SUPABASE_AUDIT_ANON_KEY" ]; then
            echo "::warning::SUPABASE_AUDIT_URL / SUPABASE_AUDIT_ANON_KEY not set — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh architectural memory (full)
        if: steps.secrets-check.outputs.skip != 'true' && env.SUPABASE_AUDIT_SERVICE_ROLE_KEY != ''
        env:
          SUPABASE_AUDIT_URL: ${{ secrets.SUPABASE_AUDIT_URL }}
          SUPABASE_AUDIT_ANON_KEY: ${{ secrets.SUPABASE_AUDIT_ANON_KEY }}
          SUPABASE_AUDIT_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_AUDIT_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run arch:refresh:full || true

      - name: Run drift sweep
        if: steps.secrets-check.outputs.skip != 'true'
        id: drift
        env:
          SUPABASE_AUDIT_URL: ${{ secrets.SUPABASE_AUDIT_URL }}
          SUPABASE_AUDIT_ANON_KEY: ${{ secrets.SUPABASE_AUDIT_ANON_KEY }}
        run: |
          set +e
          node scripts/symbol-index/drift.mjs --out /tmp/architectural-drift.md
          EXIT=$?
          set -e
          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          if [ "$EXIT" = "0" ]; then echo "status=green" >> "$GITHUB_OUTPUT";
          elif [ "$EXIT" = "1" ]; then echo "status=triggered" >> "$GITHUB_OUTPUT";
          else echo "status=error" >> "$GITHUB_OUTPUT"; fi

      - name: Run retention prune
        if: steps.secrets-check.outputs.skip != 'true' && env.SUPABASE_AUDIT_SERVICE_ROLE_KEY != ''
        env:
          SUPABASE_AUDIT_URL: ${{ secrets.SUPABASE_AUDIT_URL }}
          SUPABASE_AUDIT_ANON_KEY: ${{ secrets.SUPABASE_AUDIT_ANON_KEY }}
          SUPABASE_AUDIT_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_AUDIT_SERVICE_ROLE_KEY }}
        run: npm run arch:prune || true

      - name: Upload report artefact
        if: steps.secrets-check.outputs.skip != 'true' && hashFiles('/tmp/architectural-drift.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: architectural-drift-report
          path: /tmp/architectural-drift.md
          retention-days: 90

      - name: Open / update sticky issue on trigger
        if: steps.drift.outputs.status == 'triggered'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          MARKER='<!-- audit-loop:architectural-drift -->'
          EXISTING=$(gh api "repos/$REPO/issues?state=open&labels=architectural-drift&per_page=50" \
            --jq '[.[] | select(.body // "" | startswith("<!-- audit-loop:architectural-drift -->"))][0].number' 2>/dev/null || echo '')
          BODY=$(cat /tmp/architectural-drift.md)
          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          FOOTER=$'\n\n---\n_Auto-generated by `.github/workflows/architectural-drift.yml` — ['"run"']('"$RUN_URL"')._ '
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            printf '%s%s' "$BODY" "$FOOTER" > /tmp/issue-body.md
            gh issue edit "$EXISTING" --body-file /tmp/issue-body.md --repo "$REPO"
            gh issue comment "$EXISTING" --repo "$REPO" --body "Re-triggered on $(date -u +%Y-%m-%d). See [workflow run]($RUN_URL)."
          else
            printf '%s%s' "$BODY" "$FOOTER" > /tmp/issue-body.md
            gh label create architectural-drift --color D93F0B --description 'Architectural drift trigger fired' --repo "$REPO" 2>/dev/null || true
            gh issue create --repo "$REPO" \
              --title "architectural-drift: trigger fired ($(date -u +%Y-%m-%d))" \
              --label architectural-drift \
              --body-file /tmp/issue-body.md
          fi

      - name: Auto-close sticky issue if green
        if: steps.drift.outputs.status == 'green'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh api "repos/$REPO/issues?state=open&labels=architectural-drift&per_page=50" \
            --jq '[.[] | select(.body // "" | startswith("<!-- audit-loop:architectural-drift -->"))][0].number' 2>/dev/null || echo '')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" --body "Drift returned to green on $(date -u +%Y-%m-%d). Auto-closing — reopen if a regression is observed."
            gh issue close "$EXISTING" --repo "$REPO"
          fi

      - name: Fail workflow on infra error
        if: steps.drift.outputs.status == 'error'
        run: |
          echo "::error::drift script failed with exit code 2 (infra error, not a drift signal)"
          exit 1
