name: context-drift

# Two triggers:
#   1. PR / push to main — fast-fail on HIGH findings, SARIF for inline review
#   2. Weekly Monday cron — informational sticky issue when findings persist
#
# See scripts/check-context-drift.mjs for rule definitions.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Mondays 09:00 UTC — safety net for repos without active PRs
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

concurrency:
  group: context-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: PR / push gate. Fast-fail on HIGH; SARIF upload for inline
  # PR annotations via GitHub Code Scanning.
  # ──────────────────────────────────────────────────────────────────────
  pr-check:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run context-drift check (SARIF)
        id: drift
        run: |
          set +e
          node scripts/check-context-drift.mjs --format sarif > /tmp/context-drift.sarif
          EXIT=$?
          set -e
          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          # Always show human-readable text in the log
          node scripts/check-context-drift.mjs || true

      - name: Upload SARIF for inline PR annotations
        if: always() && hashFiles('/tmp/context-drift.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/context-drift.sarif
          category: context-drift

      - name: Fail on HIGH findings
        if: steps.drift.outputs.exit == '1'
        run: |
          echo "::error::Context drift HIGH findings detected. See PR annotations or workflow log."
          exit 1

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Weekly cron. Sticky issue when findings persist; auto-close
  # when green. Same pattern as memory-health.yml.
  # ──────────────────────────────────────────────────────────────────────
  weekly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run context-drift check
        id: drift
        run: |
          set +e
          node scripts/check-context-drift.mjs > /tmp/context-drift.txt
          EXIT=$?
          set -e
          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          if [ "$EXIT" = "0" ]; then
            echo "status=green" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT" = "1" ] || [ "$EXIT" = "2" ]; then
            echo "status=triggered" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Build issue body with marker
        if: steps.drift.outputs.status == 'triggered'
        run: |
          {
            echo '<!-- audit-loop:context-drift -->'
            echo
            echo "## Context drift detected"
            echo
            echo 'Drift between `AGENTS.md` and `CLAUDE.md` was detected during the weekly check.'
            echo 'Run `npm run context:check` locally to reproduce, or read the report below.'
            echo
            echo '```'
            cat /tmp/context-drift.txt
            echo '```'
          } > /tmp/issue-body.md

      - name: Open / update sticky issue on trigger
        if: steps.drift.outputs.status == 'triggered'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          MARKER='<!-- audit-loop:context-drift -->'
          EXISTING=$(gh api "repos/$REPO/issues?state=open&labels=context-drift&per_page=50" \
            --jq '[.[] | select(.body // "" | startswith("<!-- audit-loop:context-drift -->"))][0].number' 2>/dev/null || echo '')

          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          FOOTER=$'\n\n---\n_Auto-generated by `.github/workflows/context-drift.yml` — ['"run"']('"$RUN_URL"')._ '

          BODY=$(cat /tmp/issue-body.md)
          printf '%s%s' "$BODY" "$FOOTER" > /tmp/issue-body-full.md

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --body-file /tmp/issue-body-full.md --repo "$REPO"
            gh issue comment "$EXISTING" --repo "$REPO" --body "Re-triggered on $(date -u +%Y-%m-%d). See updated body and [workflow run]($RUN_URL)."
          else
            echo "Creating new issue"
            gh label create context-drift --color D4C5F9 --description 'AGENTS.md / CLAUDE.md drift detected by weekly cron' --repo "$REPO" 2>/dev/null || true
            gh issue create \
              --repo "$REPO" \
              --title "context-drift: AGENTS.md / CLAUDE.md alignment ($(date -u +%Y-%m-%d))" \
              --label context-drift \
              --body-file /tmp/issue-body-full.md
          fi

      - name: Auto-close sticky issue if green
        if: steps.drift.outputs.status == 'green'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh api "repos/$REPO/issues?state=open&labels=context-drift&per_page=50" \
            --jq '[.[] | select(.body // "" | startswith("<!-- audit-loop:context-drift -->"))][0].number' 2>/dev/null || echo '')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "All findings cleared — closing #$EXISTING"
            gh issue comment "$EXISTING" --repo "$REPO" --body "Context drift cleared on $(date -u +%Y-%m-%d). Auto-closing — reopen if drift returns."
            gh issue close "$EXISTING" --repo "$REPO"
          fi

      - name: Fail workflow on infrastructure error
        if: steps.drift.outputs.status == 'error'
        run: |
          echo "::error::context-drift script failed with unexpected exit code (infra error, not drift)"
          exit 1
